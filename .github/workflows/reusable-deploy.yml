name: Reusable Agent Deployment

on:
  workflow_call:
    inputs:
      gcp_project_id:
        required: true
        type: string
      service_name:
        required: true
        type: string
      region:
        required: false
        type: string
        default: "us-central1"
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  # --- GUARD: ENSURE DEVS DIDN'T FORGET KEYS ---
  validate-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Required Secrets and Variables
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::Missing Secret: GEMINI_API_KEY is not set in GitHub Secrets!"
            exit 1
          fi
          if [ -z "${{ inputs.gcp_project_id }}" ]; then
            echo "::error::Missing Variable: GCP_PROJECT_ID is not set in GitHub Variables!"
            exit 1
          fi

  # --- DEPLOYMENT: THE ACTUAL HEAVY LIFTING ---
  deploy-to-gcp:
    needs: validate-setup
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate with Google Cloud
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          # Your Golden Ticket string
          workload_identity_provider: 'projects/790741248712/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider-v2'
          service_account: 'deployer@${{ inputs.gcp_project_id }}.iam.gserviceaccount.com'

      # 2. Build and Push the Container to Artifact Registry
      - name: Build and Push
        run: |
          gcloud auth configure-docker --quiet
          # Builds from the /apps/server folder specifically
          docker build -t gcr.io/${{ inputs.gcp_project_id }}/${{ inputs.service_name }}:${{ github.sha }} ./apps/server
          docker push gcr.io/${{ inputs.gcp_project_id }}/${{ inputs.service_name }}:${{ github.sha }}

      # 3. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ inputs.service_name }}
          region: ${{ inputs.region }}
          image: gcr.io/${{ inputs.gcp_project_id }}/${{ inputs.service_name }}:${{ github.sha }}
          # Inject keys directly into the running agent
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            PORT=8080

      # 4. Success Message
      - name: Show URL
        run: |
          echo "Deployment successful!"
          echo "Agent Service URL: ${{ steps.deploy.outputs.url }}"