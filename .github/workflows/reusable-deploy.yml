name: Reusable Agent Deployment

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true
      API_KEY:
        required: true
      GH_PAT:
        required: false
      OAUTH_SERVICE_URL:
        required: false
      OAUTH_SERVICE_KEY:
        required: false
      AUTOMATION_SECRET:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      ADMIN_EMAILS:
        required: false
      COOKIE_SECRET:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_SIGNING_SECRET:
        required: false

jobs:
  provision-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      # Always build from the template — child repos only provide config.ts + secrets
      - name: Checkout template source
        uses: actions/checkout@v4
        with:
          repository: MoveoTech/boost-agents
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Apply child repo config
        uses: actions/checkout@v4
        with:
          path: _child

      - name: Overlay config.ts from child repo
        run: |
          if [ -f "_child/apps/server/src/config.ts" ]; then
            cp _child/apps/server/src/config.ts apps/server/src/config.ts
            echo "Applied config from ${{ github.repository }}"
          fi
          rm -rf _child

      # 1. AUTH AS MASTER
      - id: 'auth_master'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/45358226626/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider-v2'
          service_account: 'deployer@boost-agents-496211.iam.gserviceaccount.com'

      # 2. PROVISIONING ENGINE (Ignoring infrastructure errors)
      - name: Provision GCP Project
        id: provision
        run: |
          RAW_NAME="${{ github.event.repository.name }}"
          STRIPPED_NAME=$(echo "$RAW_NAME" | sed 's/^boost-//' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g' | cut -c1-20)
          PROJECT_ID="boost-${STRIPPED_NAME}-v7"
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT

          echo "Attempting to manage project $PROJECT_ID..."
          gcloud projects create $PROJECT_ID --folder=324333743991 --name="$RAW_NAME" || echo "Already exists."
          
          echo "Attempting Billing Link..."
          gcloud billing projects link $PROJECT_ID --billing-account=018E8F-3A2F6F-9B0E40 || echo "Billing failed."

          echo "Attempting to Enable APIs..."
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com iam.googleapis.com sts.googleapis.com iamcredentials.googleapis.com cloudscheduler.googleapis.com --project=$PROJECT_ID || echo "API failed."

          echo "Waiting 30s for APIs to activate..."
          sleep 30

          if ! gcloud iam workload-identity-pools describe "github-pool-v2" --project="$PROJECT_ID" --location="global" &>/dev/null; then
            gcloud iam workload-identity-pools create "github-pool-v2" --project="$PROJECT_ID" --location="global"
            gcloud iam workload-identity-pools providers create-oidc "github-provider-v2" \
              --project="$PROJECT_ID" --location="global" --workload-identity-pool="github-pool-v2" \
              --issuer-uri="https://token.actions.githubusercontent.com" \
              --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository,attribute.repository_owner=assertion.repository_owner" \
              --attribute-condition="assertion.repository_owner == 'MoveoTech'"

            gcloud iam service-accounts create "deployer" --project="$PROJECT_ID" || true
            gcloud projects add-iam-policy-binding "$PROJECT_ID" --member="serviceAccount:deployer@$PROJECT_ID.iam.gserviceaccount.com" --role="roles/owner" || true
            gcloud projects add-iam-policy-binding "$PROJECT_ID" --member="serviceAccount:deployer@$PROJECT_ID.iam.gserviceaccount.com" --role="roles/cloudscheduler.admin" || true
            
            NUMERIC_ID=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
            gcloud iam service-accounts add-iam-policy-binding "deployer@$PROJECT_ID.iam.gserviceaccount.com" --project="$PROJECT_ID" --role="roles/iam.workloadIdentityUser" \
              --member="principalSet://iam.googleapis.com/projects/$NUMERIC_ID/locations/global/workloadIdentityPools/github-pool-v2/attribute.repository_owner/MoveoTech" || true

            gcloud artifacts repositories create agents --repository-format=docker --location=us-central1 --project=$PROJECT_ID || true

            echo "Waiting 60s for IAM/WIF propagation..."
            sleep 60
          fi

      # 3. AUTH AS LOCAL
      - name: Get Project Number
        id: info
        run: |
          PROJ_NUM=$(gcloud projects describe ${{ steps.provision.outputs.project_id }} --format='value(projectNumber)' || echo "0000")
          echo "num=$PROJ_NUM" >> $GITHUB_OUTPUT
      
      - id: 'auth_local'
        uses: 'google-github-actions/auth@v2'
        continue-on-error: true
        with:
          workload_identity_provider: 'projects/${{ steps.info.outputs.num }}/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider-v2'
          service_account: 'deployer@${{ steps.provision.outputs.project_id }}.iam.gserviceaccount.com'

      # 4. BUILD WEB then BUILD & DEPLOY single image
      - name: Build Web App
        run: |
          cd apps/web
          npm install
          VITE_API_URL="" npm run build
          mkdir -p ../server/public
          cp -r dist/* ../server/public/

      - name: Build and Push Image
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet || true
          docker build -t us-central1-docker.pkg.dev/${{ steps.provision.outputs.project_id }}/agents/${{ inputs.service_name }}:${{ github.sha }} ./apps/server
          docker push us-central1-docker.pkg.dev/${{ steps.provision.outputs.project_id }}/agents/${{ inputs.service_name }}:${{ github.sha }} || echo "Push failed"

      - name: Deploy to Cloud Run
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        continue-on-error: true
        with:
          service: ${{ inputs.service_name }}
          region: us-central1
          image: us-central1-docker.pkg.dev/${{ steps.provision.outputs.project_id }}/agents/${{ inputs.service_name }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            API_KEY=${{ secrets.API_KEY }}
            COOKIE_SECRET=${{ secrets.COOKIE_SECRET }}
            NODE_ENV=production
            GH_PAT=${{ secrets.GH_PAT }}
            GITHUB_REPO=${{ github.repository }}
            OAUTH_SERVICE_URL=${{ secrets.OAUTH_SERVICE_URL }}
            OAUTH_SERVICE_KEY=${{ secrets.OAUTH_SERVICE_KEY }}
            AUTOMATION_SECRET=${{ secrets.AUTOMATION_SECRET }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}
            SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
            SLACK_SIGNING_SECRET=${{ secrets.SLACK_SIGNING_SECRET }}
            GOOGLE_CLOUD_PROJECT=${{ steps.provision.outputs.project_id }}

      - name: Print URL
        run: |
          echo "Agent: ${{ steps.deploy.outputs.url }}"
          echo "## ✦ Agent deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY