name: Deploy Agent

on:
  push:
    branches: [ main ]

jobs:
  run-factory-pipeline:
    # This calls your central logic
    uses: MoveoTech/boost-agents/.github/workflows/reusable-deploy.yml@main
    with:
      # We ONLY pass the service_name now. 
      # The Factory handles the Project ID automatically.
      service_name: ${{ github.event.repository.name }}
    secrets: inherit