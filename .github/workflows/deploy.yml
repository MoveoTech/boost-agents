name: Deploy Agent

on:
  push:
    branches: [ main ]

jobs:
  call-boost-pipeline:
    # Points to your organization's central 'boost-agents' repo
    uses: MoveoTech/boost-agents/.github/workflows/reusable-deploy.yml@main
    with:
      # These come from the Repo Settings > Secrets and variables > Actions
      gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
      service_name: ${{ github.event.repository.name }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}